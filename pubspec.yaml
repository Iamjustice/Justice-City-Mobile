name: justicecity_flutter
description: Justice City Flutter starter (Supabase + Node API)
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.7.0
  supabase_flutter: ^2.6.0

  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  file_picker: ^8.0.6
  mime: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/app_icon_source.png

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/images/app_icon_source.png
    background_color: "#000000"
    theme_color: "#000000"
  image_path: assets/images/app_icon_source.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/images/app_icon_source.png

flutter_native_splash:
  color: "#000000"
  image: assets/images/app_icon_source.png
  android: true
  ios: true
  web: true
  android_12:
    image: assets/images/app_icon_source.png
    icon_background_color: "#000000"
