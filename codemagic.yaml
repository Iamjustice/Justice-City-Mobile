workflows:
  justice-city-web:
    name: Justice City Web CI
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      node: 22
    scripts:
      - npm ci
      - npm run check
      - npm run build
    artifacts:
      - dist/**

  justice-city-android:
    name: Justice City Android (Capacitor)
    max_build_duration: 90
    instance_type: linux_x2
    environment:
      node: 22
      java: 17
    scripts:
      - npm ci
      - npm run check
      - npm run build
      - npm i --no-save @capacitor/cli @capacitor/core @capacitor/android
      - npx cap sync android
      - cd android && ./gradlew assembleRelease bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/mapping.txt

  justice-city-ios:
    name: Justice City iOS (Capacitor)
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - npm ci
      - npm run check
      - npm run build
      - npm i --no-save @capacitor/cli @capacitor/core @capacitor/ios
      - npx cap sync ios
      - cd ios/App && pod install
      - xcode-project build-ipa --workspace "ios/App/App.xcworkspace" --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
