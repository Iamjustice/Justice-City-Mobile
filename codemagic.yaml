workflows:
  justice-city-flutter-web:
    name: Justice City Flutter Web
    max_build_duration: 90
    instance_type: linux_x2
    environment:
      flutter: stable
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
    scripts:
      - flutter pub get
      - flutter pub run build_runner build --delete-conflicting-outputs
      - flutter analyze --no-fatal-warnings --no-fatal-infos
      - flutter test
      - flutter build web --release
    artifacts:
      - build/web/**

  justice-city-flutter-android:
    name: Justice City Flutter Android
    max_build_duration: 120
    instance_type: linux_x2
    environment:
      flutter: stable
      java: 17
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    scripts:
      - flutter pub get
      - flutter pub run build_runner build --delete-conflicting-outputs
      - flutter analyze --no-fatal-warnings --no-fatal-infos
      - flutter test
      - flutter build appbundle --release
      - flutter build apk --release
    artifacts:
      - build/app/outputs/**/*.apk
      - build/app/outputs/**/*.aab
      - build/app/outputs/**/mapping.txt

  justice-city-flutter-ios:
    name: Justice City Flutter iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - ~/.cocoapods/repos
    scripts:
      - flutter pub get
      - flutter pub run build_runner build --delete-conflicting-outputs
      - flutter analyze --no-fatal-warnings --no-fatal-infos
      - flutter test
      - flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
